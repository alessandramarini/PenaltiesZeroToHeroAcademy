<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zero To Hero - Betting Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #00ff44; --bf-back: #a6d8ff; --bf-lay: #f9c9d4; }
        body { margin: 0; background: #0a1d12; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .app-screen { position: absolute; inset: 0; z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .screen-active { display: flex !important; }
        .neon-box { background: rgba(0,0,0,0.9); border: 2px solid var(--neon-green); border-radius: 12px; box-shadow: 0 0 20px rgba(0,255,68,0.2); }
        .btn-main { padding: 12px 32px; background: var(--neon-green); color: black; border-radius: 50px; font-weight: 900; text-transform: uppercase; transition: transform 0.2s; }
        .btn-main:active { transform: scale(0.95); }
        .comparison-card { background: white; border-radius: 12px; padding: 15px; width: 100%; max-width: 350px; margin: 8px 0; }
        #hud-h-container { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 300px; height: 12px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; display: none; z-index: 10; }
        #hud-fill { height: 100%; width: 0%; background: var(--neon-green); }
        .lang-btn { font-size: 24px; padding: 8px; border: 2px solid transparent; border-radius: 50%; transition: 0.2s; }
        .lang-active { border-color: var(--neon-green); background: rgba(0,255,68,0.1); }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- SCREEN 1: LINGUA -->
<div id="screen-lang" class="app-screen screen-active">
    <div class="neon-box p-8 flex flex-col items-center">
        <h1 class="text-white font-black text-2xl mb-6 uppercase tracking-tighter">Select Language</h1>
        <div class="flex gap-4 mb-8">
            <button class="lang-btn" onclick="setLang('it')">🇮🇹</button>
            <button class="lang-btn" onclick="setLang('en')">🇬🇧</button>
            <button class="lang-btn" onclick="setLang('es')">🇪🇸</button>
        </div>
        <button id="btn-go-lang" class="btn-main">Continua</button>
    </div>
</div>

<!-- SCREEN 2: RISULTATO & COMPARAZIONE -->
<div id="screen-result" class="app-screen">
    <div class="w-full max-w-md p-4 flex flex-col items-center">
        <h2 id="res-title" class="text-white font-black text-4xl mb-4 italic uppercase">GOAL!</h2>
        
        <!-- Simulazione Back -->
        <div class="comparison-card border-l-8 border-blue-400">
            <div class="flex justify-between items-center mb-2">
                <span class="font-black text-blue-600 uppercase text-xs">BACK (Punta) @1.29</span>
                <span id="sim-back-res" class="font-mono font-bold">+€0.28</span>
            </div>
            <p id="sim-back-desc" class="text-[10px] text-gray-600 leading-tight">Se avessi puntato 1€ sul GOL, avresti incassato la quota netta (meno 5% comm).</p>
        </div>

        <!-- Simulazione Lay -->
        <div class="comparison-card border-l-8 border-pink-400">
            <div class="flex justify-between items-center mb-2">
                <span class="font-black text-pink-600 uppercase text-xs">LAY (Banca) @1.31</span>
                <span id="sim-lay-res" class="font-mono font-bold">-€0.31</span>
            </div>
            <p id="sim-lay-desc" class="text-[10px] text-gray-600 leading-tight">Se avessi bancato il GOL, avresti dovuto pagare la responsabilità al puntatore.</p>
        </div>

        <button id="btn-next" class="btn-main mt-6 w-full">Prossimo Rigore</button>
    </div>
</div>

<!-- HUD DI GIOCO -->
<div id="hud-h-container"><div id="hud-fill"></div></div>
<div id="tap-zone" class="absolute inset-0 z-20 hidden"></div>

<script>
    const i18n = {
        it: { go: "Inizia", goal: "GOL!", saved: "PARATA!", out: "FUORI!", next: "Prossimo Rigore", back_win: "Vincita Netta: +€", back_loss: "Perdita Stake: -€1.00", lay_win: "Vincita Stake: +€0.95", lay_loss: "Responsabilità: -€", desc_b_w: "Avresti vinto la scommessa a favore del gol.", desc_b_l: "Avresti perso l'euro puntato a favore del gol.", desc_l_w: "Hai 'fatto il banco' con successo: tieni lo stake del puntatore.", desc_l_l: "Come banca, devi pagare la vincita al puntatore." },
        en: { go: "Start", goal: "GOAL!", saved: "SAVED!", out: "MISSED!", next: "Next Penalty", back_win: "Net Win: +€", back_loss: "Loss: -€1.00", lay_win: "Stake Won: +€0.95", lay_loss: "Liability: -€", desc_b_w: "You would have won the bet in favor of the goal.", desc_b_l: "You would have lost the Euro bet in favor of the goal.", desc_l_w: "Successfully acted as bookie: you keep the backer's stake.", desc_l_l: "As the bookie, you must pay the winner's profit." },
        es: { go: "Empezar", goal: "¡GOL!", saved: "¡PARADA!", out: "¡FUERA!", next: "Siguiente Penalti", back_win: "Ganancia: +€", back_loss: "Pérdida: -€1.00", lay_win: "Stake ganado: +€0.95", lay_loss: "Riesgo: -€", desc_b_w: "Habrías ganado la apuesta a favor del gol.", desc_b_l: "Habrías perdido el euro apostado a favor del gol.", desc_l_w: "Operación de banca exitosa: te quedas con el stake.", desc_l_l: "Como banca, debes pagar la ganancia al apostador." }
    };

    let curLang = 'it';
    let gameState = 'IDLE';
    let power = 0;
    let pDir = 1;

    function setLang(l) {
        curLang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('lang-active'));
        event.target.classList.add('lang-active');
        document.getElementById('btn-go-lang').innerText = i18n[l].go;
    }

    // --- GAME LOGIC ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let w, h;
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function drawScene() {
        ctx.fillStyle = '#0a1d12'; ctx.fillRect(0,0,w,h);
        // Porta semplificata
        ctx.strokeStyle = 'white'; ctx.lineWidth = 5;
        ctx.strokeRect(w*0.2, h*0.2, w*0.6, h*0.3);
        // Campo
        ctx.fillStyle = '#1a5928'; ctx.fillRect(0, h*0.5, w, h*0.5);
        // Palla
        ctx.font = '50px Arial'; ctx.textAlign = 'center';
        ctx.fillText('⚽', w/2, h*0.85);
    }

    function startPower() {
        document.getElementById('screen-lang').classList.remove('screen-active');
        document.getElementById('hud-h-container').style.display = 'block';
        document.getElementById('tap-zone').classList.remove('hidden');
        gameState = 'POWER';
        animate();
    }

    function animate() {
        if(gameState === 'POWER') {
            power += 2 * pDir;
            if(power >= 100 || power <= 0) pDir *= -1;
            document.getElementById('hud-fill').style.width = power + '%';
            drawScene();
            requestAnimationFrame(animate);
        }
    }

    function shoot() {
        gameState = 'RESULT';
        document.getElementById('hud-h-container').style.display = 'none';
        document.getElementById('tap-zone').classList.add('hidden');
        
        // Esito casuale basato sulla potenza (più vicino a 80% = Gol)
        let outcome;
        if(power > 70 && power < 90) outcome = 'goal';
        else if(power >= 90) outcome = 'out';
        else outcome = 'saved';

        showRecap(outcome);
    }

    function showRecap(res) {
        const t = i18n[curLang];
        document.getElementById('res-title').innerText = t[res];
        
        const isGoal = res === 'goal';
        
        // Logica 1€ Back @1.29
        if(isGoal) {
            document.getElementById('sim-back-res').innerText = t.back_win + "0.28";
            document.getElementById('sim-back-desc').innerText = t.desc_b_w;
            document.getElementById('sim-back-res').className = "font-mono font-bold text-green-600";
        } else {
            document.getElementById('sim-back-res').innerText = t.back_loss;
            document.getElementById('sim-back-desc').innerText = t.desc_b_l;
            document.getElementById('sim-back-res').className = "font-mono font-bold text-red-600";
        }

        // Logica 1€ Lay @1.31 (Responsabilità 0.31€)
        if(!isGoal) {
            document.getElementById('sim-lay-res').innerText = t.lay_win;
            document.getElementById('sim-lay-desc').innerText = t.desc_l_w;
            document.getElementById('sim-lay-res').className = "font-mono font-bold text-green-600";
        } else {
            document.getElementById('sim-lay-res').innerText = t.lay_loss + "0.31";
            document.getElementById('sim-lay-desc').innerText = t.desc_l_l;
            document.getElementById('sim-lay-res').className = "font-mono font-bold text-red-600";
        }

        document.getElementById('btn-next').innerText = t.next;
        document.getElementById('screen-result').classList.add('screen-active');
    }

    document.getElementById('btn-go-lang').onclick = startPower;
    document.getElementById('tap-zone').onpointerdown = shoot;
    document.getElementById('btn-next').onclick = () => {
        // Qui si torna alla modalità normale del gioco (già gestita nel tuo codice originale)
        // Per semplicità qui riavviamo il loop didattico
        document.getElementById('screen-result').classList.remove('screen-active');
        power = 0;
        startPower();
    };

    drawScene();
</script>
</body>
</html>
